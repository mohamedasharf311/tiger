<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام واتساب الذكي - ردود تلقائية 24 ساعة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .btn-custom {
            background: #667eea;
            color: white;
        }
        .btn-custom:hover {
            background: #5a67d8;
            color: white;
        }
        .auto-reply-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .rule-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
        }
        .keyword-badge {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            display: inline-block;
        }
        .conversation-messages {
            max-height: 400px;
            overflow-y: auto;
        }
        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            margin-bottom: 8px;
        }
        .message-incoming {
            background: #e9ecef;
            color: #333;
            border-bottom-right-radius: 4px;
        }
        .message-outgoing {
            background: #667eea;
            color: white;
            border-bottom-left-radius: 4px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .webhook-url {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h1 class="text-white">🤖 نظام واتساب الذكي</h1>
            <p class="text-white">ردود تلقائية ذكية 24 ساعة | متابعة العملاء | إدارة الطلبات</p>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showDashboard()">
                    <i class="fas fa-chart-line fa-2x text-primary"></i>
                    <h5 class="mt-2">لوحة التحكم</h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showCustomers()">
                    <i class="fas fa-users fa-2x text-success"></i>
                    <h5 class="mt-2">العملاء</h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showOrders()">
                    <i class="fas fa-shopping-cart fa-2x text-warning"></i>
                    <h5 class="mt-2">الطلبات</h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showSend()">
                    <i class="fas fa-paper-plane fa-2x text-danger"></i>
                    <h5 class="mt-2">إرسال رسالة</h5>
                </div>
            </div>
        </div>
        
        <div class="row mb-3">
            <div class="col-md-6">
                <div class="card text-center p-2" onclick="showConversations()">
                    <i class="fas fa-comments fa-1x text-info"></i>
                    <span>سجل المحادثات</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card text-center p-2" onclick="showRulesManager()">
                    <i class="fas fa-robot fa-1x text-success"></i>
                    <span>إدارة الردود التلقائية</span>
                </div>
            </div>
        </div>
        
        <div class="card p-4" id="content">
            <div class="text-center">
                <i class="fas fa-robot fa-3x text-primary mb-3"></i>
                <h4>مرحباً بك في نظام واتساب الذكي</h4>
                <p>اختر إحدى الخدمات من الأعلى للبدء</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA STORAGE ====================
        let customers = JSON.parse(localStorage.getItem('customers') || '[]');
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        let autoRules = JSON.parse(localStorage.getItem('autoRules') || '[]');
        let conversations = JSON.parse(localStorage.getItem('conversations') || '[]');
        let welcomeMessage = localStorage.getItem('welcomeMessage') || 'مرحباً {name}! 👋\n\nشكراً لتواصلك معنا. كيف يمكننا مساعدتك اليوم؟';
        
        // القواعد الافتراضية إذا لم تكن موجودة
        if (autoRules.length === 0) {
            autoRules = [
                { id: 1, keywords: ['سعر', 'الثمن', 'كم سعر', 'بكام', 'price'], reply: '💰 سعر المنتج هو 100 جنيه مصري. هل تريد معرفة المزيد من التفاصيل؟', active: true },
                { id: 2, keywords: ['شكرا', 'ممتاز', 'تمام', 'ok', 'شكراً'], reply: '🎉 شكراً لك! نحن في خدمتك دائماً. هل تحتاج لأي شيء آخر؟', active: true },
                { id: 3, keywords: ['طلب', 'اوردر', 'اطلب', 'order', 'شراء'], reply: '🛍️ مرحباً! لإنشاء طلب جديد، يرجى إرسال:\n1. اسمك الكامل\n2. العنوان\n3. اسم المنتج\n\nسيتم التواصل معك لتأكيد الطلب.', active: true },
                { id: 4, keywords: ['توصيل', 'الشحن', 'delivery', 'شحن'], reply: '🚚 التوصيل خلال 3-5 أيام عمل. التكلفة 50 جنيهاً للتوصيل داخل القاهرة.', active: true },
                { id: 5, keywords: ['مرحباً', 'السلام', 'اهلا', 'hello', 'hi'], reply: '👋 أهلاً بك! كيف يمكنني مساعدتك اليوم؟\n\nيمكنك الاستفسار عن:\n- الأسعار 💰\n- الطلبات 🛍️\n- التوصيل 🚚', active: true },
                { id: 6, keywords: ['رقم', 'تلفون', 'واتساب', 'تواصل'], reply: '📞 يمكنك التواصل معنا عبر:\n- واتساب: 201158820082\n- الهاتف: 01158820082\n- البريد: support@example.com', active: true }
            ];
            localStorage.setItem('autoRules', JSON.stringify(autoRules));
        }
        
        function saveData() {
            localStorage.setItem('customers', JSON.stringify(customers));
            localStorage.setItem('orders', JSON.stringify(orders));
            localStorage.setItem('conversations', JSON.stringify(conversations));
        }
        
        function saveRules() {
            localStorage.setItem('autoRules', JSON.stringify(autoRules));
            localStorage.setItem('welcomeMessage', welcomeMessage);
        }
        
        // ==================== AUTO REPLY FUNCTIONS ====================
        function getAutoReply(message) {
            const lowerMsg = message.toLowerCase();
            for (let rule of autoRules) {
                if (!rule.active) continue;
                for (let keyword of rule.keywords) {
                    if (lowerMsg.includes(keyword.toLowerCase())) {
                        return rule.reply;
                    }
                }
            }
            return null;
        }
        
        async function sendAutoMessage(phone, message) {
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                const result = await response.json();
                if (result.success) {
                    console.log(`✅ Auto message sent to ${phone}`);
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Auto message error:', error);
                return false;
            }
        }
        
        async function processIncomingMessage(phone, message, isTest = false) {
            console.log(`📩 رسالة واردة من ${phone}: ${message}`);
            
            // حفظ المحادثة
            conversations.unshift({
                phone: phone,
                message: message,
                direction: 'incoming',
                timestamp: new Date().toISOString(),
                replied: false
            });
            
            const autoReply = getAutoReply(message);
            let replyMessage = null;
            
            if (autoReply) {
                console.log(`🤖 رد تلقائي: ${autoReply}`);
                const sent = await sendAutoMessage(phone, autoReply);
                if (sent) {
                    replyMessage = autoReply;
                    conversations.unshift({
                        phone: phone,
                        message: autoReply,
                        direction: 'outgoing',
                        timestamp: new Date().toISOString(),
                        isAuto: true
                    });
                }
            } else {
                // رد عام
                const fallbackReply = '👋 شكراً لتواصلك! سيتم الرد عليك قريباً. إذا كان لديك استفسار عن الأسعار أو الطلبات، يمكنك كتابة "سعر" أو "طلب"';
                await sendAutoMessage(phone, fallbackReply);
                replyMessage = fallbackReply;
                conversations.unshift({
                    phone: phone,
                    message: fallbackReply,
                    direction: 'outgoing',
                    timestamp: new Date().toISOString(),
                    isAuto: true
                });
            }
            
            // الاحتفاظ بآخر 200 محادثة فقط
            if (conversations.length > 200) conversations = conversations.slice(0, 200);
            saveData();
            
            return { replied: true, message: replyMessage };
        }
        
        function addAutoRule(keywords, reply) {
            const newRule = {
                id: Date.now(),
                keywords: keywords.split(',').map(k => k.trim().toLowerCase()),
                reply: reply,
                active: true,
                createdAt: new Date().toISOString()
            };
            autoRules.push(newRule);
            saveRules();
            return newRule;
        }
        
        function deleteAutoRule(id) {
            autoRules = autoRules.filter(r => r.id !== id);
            saveRules();
            if (document.getElementById('rulesList')) displayAutoRulesInManager();
            if (document.getElementById('autoReplyRules')) displayAutoRules();
        }
        
        function toggleRule(id, active) {
            const rule = autoRules.find(r => r.id === id);
            if (rule) {
                rule.active = active;
                saveRules();
                if (document.getElementById('rulesList')) displayAutoRulesInManager();
                if (document.getElementById('autoReplyRules')) displayAutoRules();
            }
        }
        
        function displayAutoRules() {
            const container = document.getElementById('autoReplyRules');
            if (!container) return;
            
            if (autoRules.length === 0) {
                container.innerHTML = '<p class="text-muted">لا توجد قواعد. أضف قاعدة جديدة!</p>';
                return;
            }
            
            container.innerHTML = autoRules.map(rule => `
                <div class="rule-card">
                    <div class="d-flex justify-content-between">
                        <strong>🔑 الكلمات المفتاحية:</strong>
                        <button class="btn btn-sm btn-danger" onclick="deleteAutoRule(${rule.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="mb-2">
                        ${rule.keywords.map(k => `<span class="keyword-badge">${escapeHtml(k)}</span>`).join('')}
                    </div>
                    <div class="mt-2">
                        <strong>💬 الرد التلقائي:</strong><br>
                        ${escapeHtml(rule.reply)}
                    </div>
                    <div class="mt-2">
                        <label>
                            <input type="checkbox" ${rule.active ? 'checked' : ''} 
                                   onchange="toggleRule(${rule.id}, this.checked)">
                            مفعل
                        </label>
                    </div>
                </div>
            `).join('');
        }
        
        function saveWelcomeMessage() {
            const newMsg = document.getElementById('welcomeMsgInput').value;
            if (newMsg) {
                welcomeMessage = newMsg;
                localStorage.setItem('welcomeMessage', welcomeMessage);
                alert('✅ تم حفظ رسالة الترحيب');
            }
        }
        
        // ==================== CUSTOMER FUNCTIONS ====================
        function addCustomerWithWelcome(name, phone) {
            const newCustomer = {
                id: Date.now(),
                name: name,
                phone: phone,
                status: 'new',
                createdAt: new Date().toISOString(),
                interactions: []
            };
            customers.push(newCustomer);
            saveData();
            
            let welcome = welcomeMessage.replace('{name}', name);
            sendAutoMessage(phone, welcome);
            return newCustomer;
        }
        
        function addCustomer() {
            const name = prompt('أدخل اسم العميل:');
            const phone = prompt('أدخل رقم الهاتف:');
            if (name && phone) {
                addCustomerWithWelcome(name, phone);
                showCustomers();
                alert('✅ تم إضافة العميل وإرسال رسالة ترحيب');
            }
        }
        
        function deleteCustomer(index) {
            if (confirm('هل أنت متأكد من حذف هذا العميل؟')) {
                customers.splice(index, 1);
                saveData();
                showCustomers();
            }
        }
        
        // ==================== ORDER FUNCTIONS ====================
        function addOrder() {
            const customerName = prompt('اسم العميل:');
            const phone = prompt('رقم الهاتف:');
            const product = prompt('اسم المنتج:');
            if (customerName && phone && product) {
                orders.push({
                    id: `ORD-${Date.now()}`,
                    customerName: customerName,
                    phone: phone,
                    product: product,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                saveData();
                showOrders();
                alert('✅ تم إضافة الطلب');
            }
        }
        
        function completeOrder(index) {
            orders[index].status = 'completed';
            saveData();
            showOrders();
        }
        
        function deleteOrder(index) {
            if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
                orders.splice(index, 1);
                saveData();
                showOrders();
            }
        }
        
        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            const resultDiv = document.getElementById('sendResult');
            
            if (!phone || !message) {
                alert('❌ الرجاء إدخال رقم الهاتف والرسالة');
                return;
            }
            
            resultDiv.innerHTML = '<div class="alert alert-info">📡 جاري الإرسال...</div>';
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = '<div class="alert alert-success">✅ تم إرسال الرسالة بنجاح</div>';
                    document.getElementById('message').value = '';
                    
                    // حفظ المحادثة
                    conversations.unshift({
                        phone: phone,
                        message: message,
                        direction: 'outgoing',
                        timestamp: new Date().toISOString(),
                        isAuto: false
                    });
                    saveData();
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ فشل الإرسال: ${result.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        function selectCustomer(phone) {
            document.getElementById('phone').value = phone;
            document.getElementById('message').focus();
        }
        
        function sendTo(phone) {
            showSend();
            setTimeout(() => {
                document.getElementById('phone').value = phone;
                document.getElementById('message').focus();
            }, 100);
        }
        
        // ==================== CONVERSATIONS ====================
        function showConversations() {
            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-comments"></i> سجل المحادثات</h4>
                    <button class="btn btn-outline-danger btn-sm" onclick="clearConversations()">
                        <i class="fas fa-trash"></i> مسح الكل
                    </button>
                </div>
            `;
            
            if (conversations.length === 0) {
                html += '<div class="alert alert-info">لا توجد محادثات حتى الآن</div>';
            } else {
                // تجميع المحادثات حسب الرقم
                const grouped = {};
                conversations.forEach(conv => {
                    if (!grouped[conv.phone]) grouped[conv.phone] = [];
                    grouped[conv.phone].push(conv);
                });
                
                Object.entries(grouped).forEach(([phone, msgs]) => {
                    html += `
                        <div class="card mb-3">
                            <div class="card-header bg-light d-flex justify-content-between">
                                <strong>📱 ${escapeHtml(phone)}</strong>
                                <button class="btn btn-sm btn-primary" onclick="sendTo('${phone}')">
                                    <i class="fas fa-reply"></i> رد
                                </button>
                            </div>
                            <div class="card-body conversation-messages">
                    `;
                    
                    msgs.slice(-15).forEach(msg => {
                        const isIncoming = msg.direction === 'incoming';
                        html += `
                            <div class="text-${isIncoming ? 'right' : 'left'} mb-2">
                                <div class="message-bubble ${isIncoming ? 'message-incoming' : 'message-outgoing'}">
                                    <small class="${isIncoming ? 'text-muted' : 'text-white-50'}">
                                        ${isIncoming ? '👤 عميل' : (msg.isAuto ? '🤖 بوت' : '📤 أنت')}
                                    </small><br>
                                    ${escapeHtml(msg.message)}
                                    <br><small style="font-size: 10px; opacity: 0.7;">
                                        ${new Date(msg.timestamp).toLocaleTimeString('ar')}
                                    </small>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                });
            }
            
            document.getElementById('content').innerHTML = html;
        }
        
        function clearConversations() {
            if (confirm('هل أنت متأكد من مسح جميع المحادثات؟')) {
                conversations = [];
                saveData();
                showConversations();
            }
        }
        
        // ==================== RULES MANAGER ====================
        function showRulesManager() {
            document.getElementById('content').innerHTML = `
                <h4><i class="fas fa-robot"></i> إدارة الردود التلقائية</h4>
                
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">
                        <strong>➕ إضافة قاعدة جديدة</strong>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">الكلمات المفتاحية (مفصولة بفواصل)</label>
                            <input type="text" class="form-control" id="newKeywords" 
                                   placeholder="مثال: سعر, كم سعر, الثمن">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الرد التلقائي</label>
                            <textarea class="form-control" id="newReply" rows="3" 
                                      placeholder="مثال: سعر المنتج هو 100 جنيه"></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="addReplyFromUI()">
                            <i class="fas fa-plus"></i> إضافة القاعدة
                        </button>
                    </div>
                </div>
                
                <h5>📋 القواعد الحالية</h5>
                <div id="rulesList"></div>
            `;
            displayAutoRulesInManager();
        }
        
        function addReplyFromUI() {
            const keywords = document.getElementById('newKeywords').value;
            const reply = document.getElementById('newReply').value;
            
            if (!keywords || !reply) {
                alert('❌ الرجاء إدخال الكلمات المفتاحية والرد');
                return;
            }
            
            addAutoRule(keywords, reply);
            document.getElementById('newKeywords').value = '';
            document.getElementById('newReply').value = '';
            displayAutoRulesInManager();
            alert('✅ تم إضافة قاعدة الرد التلقائي');
        }
        
        function displayAutoRulesInManager() {
            const container = document.getElementById('rulesList');
            if (!container) return;
            
            if (autoRules.length === 0) {
                container.innerHTML = '<div class="alert alert-info">لا توجد قواعد. أضف قاعدة جديدة!</div>';
                return;
            }
            
            container.innerHTML = autoRules.map(rule => `
                <div class="rule-card">
                    <div class="d-flex justify-content-between">
                        <strong>🔑 الكلمات المفتاحية:</strong>
                        <button class="btn btn-sm btn-danger" onclick="deleteAutoRule(${rule.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="mb-2">
                        ${rule.keywords.map(k => `<span class="keyword-badge">${escapeHtml(k)}</span>`).join('')}
                    </div>
                    <div class="mt-2">
                        <strong>💬 الرد:</strong><br>
                        ${escapeHtml(rule.reply)}
                    </div>
                    <div class="mt-2">
                        <label>
                            <input type="checkbox" ${rule.active ? 'checked' : ''} 
                                   onchange="toggleRule(${rule.id}, this.checked)">
                            مفعل
                        </label>
                    </div>
                </div>
            `).join('');
        }
        
        // ==================== TEST WEBHOOK ====================
        async function testWebhook() {
            const phone = prompt('رقم الهاتف للاختبار:', '201158820082');
            const message = prompt('أدخل رسالة اختبار:', 'سعر المنتج');
            
            if (phone && message) {
                const resultDiv = document.getElementById('content');
                const originalHtml = resultDiv.innerHTML;
                resultDiv.innerHTML = '<div class="text-center"><div class="loading"></div><p class="mt-2">جاري اختبار الرد التلقائي...</p></div>';
                
                try {
                    const result = await processIncomingMessage(phone, message, true);
                    if (result.replied) {
                        alert(`✅ تم الرد تلقائياً:\n\n${result.message}`);
                        showConversations();
                    } else {
                        alert('⚠️ لا يوجد رد تلقائي لهذه الرسالة');
                        showDashboard();
                    }
                } catch (error) {
                    alert('❌ خطأ: ' + error.message);
                    showDashboard();
                }
            }
        }
        
        // ==================== UI PAGES ====================
        function showDashboard() {
            const stats = {
                totalCustomers: customers.length,
                activeCustomers: customers.filter(c => c.status === 'active').length,
                totalOrders: orders.length,
                pendingOrders: orders.filter(o => o.status === 'pending').length
            };
            
            document.getElementById('content').innerHTML = `
                <h4><i class="fas fa-chart-line"></i> لوحة التحكم</h4>
                <div class="row mt-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-users fa-2x text-primary"></i>
                            <h3>${stats.totalCustomers}</h3>
                            <p>إجمالي العملاء</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-check-circle fa-2x text-success"></i>
                            <h3>${stats.activeCustomers}</h3>
                            <p>عملاء نشطين</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-shopping-cart fa-2x text-warning"></i>
                            <h3>${stats.totalOrders}</h3>
                            <p>إجمالي الطلبات</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-clock fa-2x text-info"></i>
                            <h3>${stats.pendingOrders}</h3>
                            <p>طلبات قيد المراجعة</p>
                        </div>
                    </div>
                </div>
                
                <div class="row mt-4">
                    <div class="col-md-12">
                        <div class="alert alert-info">
                            <strong>🤖 نظام الرد التلقائي 24 ساعة</strong><br>
                            <small>Webhook URL: <code class="webhook-url">https://tiger-eta.vercel.app/api/wapilot-webhook</code></small>
                        </div>
                        <button class="btn btn-success w-100 mb-2" onclick="testWebhook()">
                            <i class="fas fa-paper-plane"></i> اختبار الرد التلقائي (محاكاة)
                        </button>
                        <button class="btn btn-outline-secondary w-100" onclick="showConversations()">
                            <i class="fas fa-comments"></i> عرض سجل المحادثات
                        </button>
                    </div>
                </div>
            `;
        }
        
        function showCustomers() {
            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-users"></i> قائمة العملاء</h4>
                    <button class="btn btn-primary" onclick="addCustomer()">➕ إضافة عميل</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr><th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>التاريخ</th><th>الإجراءات</th>  </tr>
                        </thead>
                        <tbody>
            `;
            
            if (customers.length === 0) {
                html += '<tr><td colspan="5" class="text-center">لا يوجد عملاء</td></tr>';
            } else {
                customers.forEach((c, i) => {
                    html += `
                        <tr>
                            <td>${escapeHtml(c.name || '-')}</td>
                            <td>${escapeHtml(c.phone)}</td>
                            <td><span class="badge bg-secondary">${c.status || 'جديد'}</span></td>
                            <td>${new Date(c.createdAt).toLocaleDateString('ar')}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="sendTo('${c.phone}')">
                                    <i class="fas fa-paper-plane"></i> إرسال
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${i})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            
            html += `</tbody></table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        
        function showOrders() {
            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-shopping-cart"></i> الطلبات</h4>
                    <button class="btn btn-primary" onclick="addOrder()">➕ إضافة طلب</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr><th>رقم الطلب</th><th>العميل</th><th>الهاتف</th><th>المنتج</th><th>الحالة</th><th>التاريخ</th><th>الإجراءات</th></tr>
                        </thead>
                        <tbody>
            `;
            
            if (orders.length === 0) {
                html += '<tr><td colspan="7" class="text-center">لا توجد طلبات</td></tr>';
            } else {
                orders.forEach((o, i) => {
                    html += `
                        <tr>
                            <td><strong>${escapeHtml(o.id)}</strong></td>
                            <td>${escapeHtml(o.customerName || '-')}</td>
                            <td>${escapeHtml(o.phone || '-')}</td>
                            <td>${escapeHtml(o.product || '-')}</td>
                            <td><span class="badge ${o.status === 'pending' ? 'bg-warning' : 'bg-success'}">${o.status === 'pending' ? 'قيد المراجعة' : 'مكتمل'}</span></td>
                            <td>${new Date(o.createdAt).toLocaleDateString('ar')}</td>
                            <td>
                                ${o.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="completeOrder(${i})"><i class="fas fa-check"></i> إكمال</button>` : ''}
                                <button class="btn btn-sm btn-danger" onclick="deleteOrder(${i})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            }
            
            html += `</tbody></table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        
        function showSend() {
            document.getElementById('content').innerHTML = `
                <h4><i class="fas fa-paper-plane"></i> إرسال رسالة</h4>
                <form class="mt-3" onsubmit="sendMessage(); return false;">
                    <div class="mb-3">
                        <label class="form-label">رقم الهاتف</label>
                        <input type="text" class="form-control" id="phone" placeholder="مثال: 201158820082" required>
                        <small class="text-muted">أدخل الرقم بدون + أو أصفار</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الرسالة</label>
                        <textarea class="form-control" id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">📤 إرسال</button>
                    <div id="sendResult" class="mt-3"></div>
                </form>
                
                <hr>
                
                <h5>📋 الردود التلقائية الذكية</h5>
                <div class="auto-reply-section">
                    <div id="autoReplyRules"></div>
                    <button class="btn btn-outline-primary mt-2" onclick="showRulesManager()">
                        <i class="fas fa-cog"></i> إدارة القواعد
                    </button>
                </div>
                
                <hr>
                
                <h5>👋 رسالة الترحيب للعملاء الجدد</h5>
                <div class="auto-reply-section">
                    <textarea id="welcomeMsgInput" rows="3" class="form-control">${escapeHtml(welcomeMessage)}</textarea>
                    <button class="btn btn-success mt-2" onclick="saveWelcomeMessage()">
                        <i class="fas fa-save"></i> حفظ رسالة الترحيب
                    </button>
                </div>
                
                <hr>
                
                <h5>اختر عميلاً سريعاً:</h5>
                <div class="row">
                    ${customers.map(c => `
                        <div class="col-md-3 mb-2">
                            <button class="btn btn-outline-primary w-100" onclick="selectCustomer('${c.phone}')">
                                ${escapeHtml(c.name || c.phone)}
                            </button>
                        </div>
                    `).join('')}
                    ${customers.length === 0 ? '<p class="text-muted">لا يوجد عملاء مسجلين</p>' : ''}
                </div>
            `;
            displayAutoRules();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Load dashboard on start
        showDashboard();
        console.log('✅ نظام واتساب الذكي جاهز مع الردود التلقائية 24 ساعة');
    </script>
</body>
</html>
