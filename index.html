<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام واتساب الذكي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .btn-custom {
            background: #667eea;
            color: white;
        }
        .btn-custom:hover {
            background: #5a67d8;
            color: white;
        }
        .auto-reply-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .rule-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
        }
        .keyword-badge {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
            display: inline-block;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h1 class="text-white">🤖 نظام واتساب الذكي</h1>
            <p class="text-white">نظام متابعة العملاء وإدارة الطلبات مع ردود تلقائية ذكية</p>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showDashboard()">
                    <i class="fas fa-chart-line fa-2x text-primary"></i>
                    <h5 class="mt-2">لوحة التحكم</h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showCustomers()">
                    <i class="fas fa-users fa-2x text-success"></i>
                    <h5 class="mt-2">العملاء</h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showOrders()">
                    <i class="fas fa-shopping-cart fa-2x text-warning"></i>
                    <h5 class="mt-2">الطلبات</h5>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-3" onclick="showSend()">
                    <i class="fas fa-paper-plane fa-2x text-danger"></i>
                    <h5 class="mt-2">إرسال رسالة</h5>
                </div>
            </div>
        </div>
        
        <div class="card p-4" id="content">
            <div class="text-center">
                <i class="fas fa-robot fa-3x text-primary mb-3"></i>
                <h4>مرحباً بك</h4>
                <p>اختر إحدى الخدمات من الأعلى</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== DATA STORAGE ====================
        let customers = JSON.parse(localStorage.getItem('customers') || '[]');
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        let autoRules = JSON.parse(localStorage.getItem('autoRules') || '[]');
        let welcomeMessage = localStorage.getItem('welcomeMessage') || 'مرحباً {name}! 👋\n\nشكراً لتواصلك معنا. كيف يمكننا مساعدتك اليوم؟';
        
        function saveData() {
            localStorage.setItem('customers', JSON.stringify(customers));
            localStorage.setItem('orders', JSON.stringify(orders));
        }
        
        function saveRules() {
            localStorage.setItem('autoRules', JSON.stringify(autoRules));
            localStorage.setItem('welcomeMessage', welcomeMessage);
        }
        
        // ==================== AUTO REPLY FUNCTIONS ====================
        function getAutoReply(message) {
            const lowerMsg = message.toLowerCase();
            
            for (let rule of autoRules) {
                if (!rule.active) continue;
                for (let keyword of rule.keywords) {
                    if (lowerMsg.includes(keyword)) {
                        return rule.reply;
                    }
                }
            }
            return null;
        }
        
        async function sendAutoMessage(phone, message) {
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                const result = await response.json();
                if (result.success) {
                    console.log(`✅ Auto message sent to ${phone}`);
                }
            } catch (error) {
                console.error('Auto message error:', error);
            }
        }
        
        async function processIncomingMessage(phone, message) {
            console.log(`📩 رسالة واردة من ${phone}: ${message}`);
            
            const autoReply = getAutoReply(message);
            
            if (autoReply) {
                console.log(`🤖 رد تلقائي: ${autoReply}`);
                await sendAutoMessage(phone, autoReply);
                return { replied: true, message: autoReply };
            }
            
            return { replied: false };
        }
        
        function addAutoRule(keywords, reply) {
            autoRules.push({
                id: Date.now(),
                keywords: keywords.split(',').map(k => k.trim().toLowerCase()),
                reply: reply,
                active: true
            });
            saveRules();
            displayAutoRules();
        }
        
        function deleteAutoRule(id) {
            autoRules = autoRules.filter(r => r.id !== id);
            saveRules();
            displayAutoRules();
        }
        
        function toggleRule(id, active) {
            const rule = autoRules.find(r => r.id === id);
            if (rule) {
                rule.active = active;
                saveRules();
                displayAutoRules();
            }
        }
        
        function displayAutoRules() {
            const container = document.getElementById('autoReplyRules');
            if (!container) return;
            
            if (autoRules.length === 0) {
                container.innerHTML = '<p class="text-muted">لا توجد قواعد. أضف قاعدة جديدة!</p>';
                return;
            }
            
            container.innerHTML = autoRules.map(rule => `
                <div class="rule-card">
                    <div class="d-flex justify-content-between">
                        <strong>🔑 الكلمات المفتاحية:</strong>
                        <button class="btn btn-sm btn-danger" onclick="deleteAutoRule(${rule.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="mb-2">
                        ${rule.keywords.map(k => `<span class="keyword-badge">${k}</span>`).join('')}
                    </div>
                    <div class="mt-2">
                        <strong>💬 الرد التلقائي:</strong><br>
                        ${rule.reply}
                    </div>
                    <div class="mt-2">
                        <label class="form-check-label">
                            <input type="checkbox" class="form-check-input" ${rule.active ? 'checked' : ''} 
                                   onchange="toggleRule(${rule.id}, this.checked)">
                            مفعل
                        </label>
                    </div>
                </div>
            `).join('');
        }
        
        function showAddRuleModal() {
            const keywords = prompt('أدخل الكلمات المفتاحية (مفصولة بفواصل):\nمثال: سعر, كم السعر, الثمن');
            if (!keywords) return;
            
            const reply = prompt('أدخل الرد التلقائي:\nمثال: سعر المنتج هو 100 جنيه');
            if (!reply) return;
            
            addAutoRule(keywords, reply);
        }
        
        function saveWelcomeMessage() {
            const newMsg = document.getElementById('welcomeMsgInput').value;
            if (newMsg) {
                welcomeMessage = newMsg;
                localStorage.setItem('welcomeMessage', welcomeMessage);
                alert('✅ تم حفظ رسالة الترحيب');
            }
        }
        
        function simulateIncomingMessage() {
            const phone = prompt('رقم الهاتف:');
            const message = prompt('الرسالة:');
            if (phone && message) {
                processIncomingMessage(phone, message);
            }
        }
        
        // ==================== CUSTOMER FUNCTIONS ====================
        function addCustomerWithWelcome(name, phone) {
            const newCustomer = {
                id: Date.now(),
                name: name,
                phone: phone,
                status: 'new',
                createdAt: new Date().toISOString(),
                interactions: []
            };
            
            customers.push(newCustomer);
            saveData();
            
            let welcome = welcomeMessage.replace('{name}', name);
            sendAutoMessage(phone, welcome);
            
            return newCustomer;
        }
        
        function addCustomer() {
            const name = prompt('أدخل اسم العميل:');
            const phone = prompt('أدخل رقم الهاتف:');
            if (name && phone) {
                addCustomerWithWelcome(name, phone);
                showCustomers();
                alert('✅ تم إضافة العميل وإرسال رسالة ترحيب');
            }
        }
        
        function deleteCustomer(index) {
            if (confirm('هل أنت متأكد من حذف هذا العميل؟')) {
                customers.splice(index, 1);
                saveData();
                showCustomers();
            }
        }
        
        // ==================== ORDER FUNCTIONS ====================
        function addOrder() {
            const customerName = prompt('اسم العميل:');
            const phone = prompt('رقم الهاتف:');
            const product = prompt('اسم المنتج:');
            if (customerName && phone && product) {
                orders.push({
                    id: `ORD-${Date.now()}`,
                    customerName: customerName,
                    phone: phone,
                    product: product,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                saveData();
                showOrders();
                alert('✅ تم إضافة الطلب');
            }
        }
        
        function completeOrder(index) {
            orders[index].status = 'completed';
            saveData();
            showOrders();
        }
        
        function deleteOrder(index) {
            if (confirm('هل أنت متأكد من حذف هذا الطلب؟')) {
                orders.splice(index, 1);
                saveData();
                showOrders();
            }
        }
        
        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            const resultDiv = document.getElementById('sendResult');
            
            if (!phone || !message) {
                alert('❌ الرجاء إدخال رقم الهاتف والرسالة');
                return;
            }
            
            resultDiv.innerHTML = '<div class="alert alert-info">📡 جاري الإرسال...</div>';
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = '<div class="alert alert-success">✅ تم إرسال الرسالة بنجاح</div>';
                    document.getElementById('message').value = '';
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ فشل الإرسال: ${result.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        function selectCustomer(phone) {
            document.getElementById('phone').value = phone;
            document.getElementById('message').focus();
        }
        
        function sendTo(phone) {
            showSend();
            setTimeout(() => {
                document.getElementById('phone').value = phone;
                document.getElementById('message').focus();
            }, 100);
        }
        
        // ==================== UI PAGES ====================
        function showDashboard() {
            const stats = {
                totalCustomers: customers.length,
                activeCustomers: customers.filter(c => c.status === 'active').length,
                totalOrders: orders.length,
                pendingOrders: orders.filter(o => o.status === 'pending').length
            };
            
            document.getElementById('content').innerHTML = `
                <h4><i class="fas fa-chart-line"></i> لوحة التحكم</h4>
                <div class="row mt-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-users fa-2x text-primary"></i>
                            <h3>${stats.totalCustomers}</h3>
                            <p>إجمالي العملاء</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-check-circle fa-2x text-success"></i>
                            <h3>${stats.activeCustomers}</h3>
                            <p>عملاء نشطين</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-shopping-cart fa-2x text-warning"></i>
                            <h3>${stats.totalOrders}</h3>
                            <p>إجمالي الطلبات</p>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <i class="fas fa-clock fa-2x text-info"></i>
                            <h3>${stats.pendingOrders}</h3>
                            <p>طلبات قيد المراجعة</p>
                        </div>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-md-12">
                        <button class="btn btn-outline-secondary" onclick="simulateIncomingMessage()">
                            <i class="fas fa-comment-dots"></i> اختبار الرد التلقائي (محاكاة)
                        </button>
                    </div>
                </div>
            `;
        }
        
        function showCustomers() {
            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-users"></i> قائمة العملاء</h4>
                    <button class="btn btn-primary" onclick="addCustomer()">➕ إضافة عميل</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr><th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>التاريخ</th><th>الإجراءات</th> </tr>
                        </thead>
                        <tbody>
            `;
            
            if (customers.length === 0) {
                html += '<tr><td colspan="5" class="text-center">لا يوجد عملاء</td></tr>';
            } else {
                customers.forEach((c, i) => {
                    html += `
                        <tr>
                            <td>${c.name || '-'}</td>
                            <td>${c.phone}</td>
                            <td><span class="badge bg-secondary">${c.status || 'جديد'}</span></td>
                            <td>${new Date(c.createdAt).toLocaleDateString('ar')}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="sendTo('${c.phone}')">
                                    <i class="fas fa-paper-plane"></i> إرسال
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${i})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            
            html += `</tbody></table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        
        function showOrders() {
            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4><i class="fas fa-shopping-cart"></i> الطلبات</h4>
                    <button class="btn btn-primary" onclick="addOrder()">➕ إضافة طلب</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr><th>رقم الطلب</th><th>العميل</th><th>الهاتف</th><th>المنتج</th><th>الحالة</th><th>التاريخ</th><th>الإجراءات</th> </tr>
                        </thead>
                        <tbody>
            `;
            
            if (orders.length === 0) {
                html += '<tr><td colspan="7" class="text-center">لا توجد طلبات</td></tr>';
            } else {
                orders.forEach((o, i) => {
                    html += `
                        <tr>
                            <td><strong>${o.id}</strong></td>
                            <td>${o.customerName || '-'}</td>
                            <td>${o.phone || '-'}</td>
                            <td>${o.product || '-'}</td>
                            <td><span class="badge ${o.status === 'pending' ? 'bg-warning' : 'bg-success'}">${o.status === 'pending' ? 'قيد المراجعة' : 'مكتمل'}</span></td>
                            <td>${new Date(o.createdAt).toLocaleDateString('ar')}</td>
                            <td>
                                <button class="btn btn-sm btn-success" onclick="completeOrder(${i})">
                                    <i class="fas fa-check"></i> إكمال
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteOrder(${i})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
            
            html += `</tbody></table></div>`;
            document.getElementById('content').innerHTML = html;
        }
        
        function showSend() {
            document.getElementById('content').innerHTML = `
                <h4><i class="fas fa-paper-plane"></i> إرسال رسالة</h4>
                <form class="mt-3" onsubmit="sendMessage(); return false;">
                    <div class="mb-3">
                        <label class="form-label">رقم الهاتف</label>
                        <input type="text" class="form-control" id="phone" placeholder="مثال: 201158820082" required>
                        <small class="text-muted">أدخل الرقم بدون + أو أصفار</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الرسالة</label>
                        <textarea class="form-control" id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">📤 إرسال</button>
                    <div id="sendResult" class="mt-3"></div>
                </form>
                
                <hr>
                
                <h5>📋 الردود التلقائية الذكية</h5>
                <div class="auto-reply-section">
                    <div id="autoReplyRules"></div>
                    <button class="btn btn-outline-primary mt-2" onclick="showAddRuleModal()">
                        <i class="fas fa-plus"></i> إضافة قاعدة رد تلقائي
                    </button>
                </div>
                
                <hr>
                
                <h5>👋 رسالة الترحيب للعملاء الجدد</h5>
                <div class="auto-reply-section">
                    <textarea id="welcomeMsgInput" rows="3" class="form-control">${welcomeMessage}</textarea>
                    <button class="btn btn-success mt-2" onclick="saveWelcomeMessage()">
                        <i class="fas fa-save"></i> حفظ رسالة الترحيب
                    </button>
                </div>
                
                <hr>
                
                <h5>اختر عميلاً سريعاً:</h5>
                <div class="row">
                    ${customers.map(c => `
                        <div class="col-md-3 mb-2">
                            <button class="btn btn-outline-primary w-100" onclick="selectCustomer('${c.phone}')">
                                ${c.name || c.phone}
                            </button>
                        </div>
                    `).join('')}
                    ${customers.length === 0 ? '<p class="text-muted">لا يوجد عملاء مسجلين</p>' : ''}
                </div>
            `;
            
            displayAutoRules();
        }
        
        // Load dashboard on start
        showDashboard();
        console.log('✅ نظام واتساب الذكي جاهز مع الردود التلقائية');
    </script>
</body>
</html>
